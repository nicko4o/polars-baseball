# Nightly contract checks to detect upstream MLB data schema changes
name: Nightly Upstream Contract Check

on:
  schedule:
    # Run everyday at 00:00 UTC (8:00 AM Taipei Time)
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run live contract tests
        run: uv run pytest tests/polars_baseball/test_live_contracts.py -m "live" -v

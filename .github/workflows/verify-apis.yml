# Nightly live API verification to detect upstream MLB data source outages
name: Nightly API Verification

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run API verification
        run: uv run python scripts/verify_all_apis.py 2>&1 | tee api_verification.log
        env:
          SKIP_BREF: "1"
          SKIP_FG: "1"

      - name: Upload verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-verification-log
          path: api_verification.log

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-breakage',
            });
            if (existing.length > 0) {
              console.log(`Issue already exists: #${existing[0].number}`);
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'API verification failure detected',
              body: 'The nightly API verification check failed. This may indicate an upstream MLB data source outage or breaking change.\n\nSee: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              labels: ['upstream-breakage'],
            });

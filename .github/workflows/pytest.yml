# This workflow will run tests on PRs and pushes to main

name: PyTest On PR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-suffix: lint
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --locked --all-extras
      - name: Run Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v19
      - name: Run Ruff Linter
        run: uv run ruff check .
      - name: Run Ruff Formatter Check
        run: uv run ruff format --check .
      - name: Run Vulture Dead Code Check
        run: uv run vulture polars_baseball tests --config pyproject.toml
      - name: Run dependency audit
        run: uv audit
      - name: Check examples syntax
        run: uv run python -m py_compile examples/*.py
      - name: Dry-run Package Build
        run: uv build

  test:
    needs: lint
    strategy:
      matrix:
        python-version:
        - "3.11"
        - "3.12"
        - "3.13"
    name: Test py-${{ matrix.python-version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-suffix: py-${{ matrix.python-version }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python-version }}"
      - name: Install dependencies
        run: uv sync --locked --all-extras
      - name: Cache MyPy
        uses: actions/cache@v6
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml', 'mypy.ini') }}-${{ github.run_id }}
          restore-keys: |
            mypy-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml', 'mypy.ini') }}-
            mypy-${{ runner.os }}-${{ matrix.python-version }}-
      - name: Run MyPy
        run: make mypy ONLY_MODIFIED=0
      - name: Run tests
        run: make test TEST_FLAGS="-n 5 -m 'not live' --cov-report=xml"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true
      - name: Cache test
        run: uv run python ./scripts/validate_cache.py
